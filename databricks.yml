bundle:
  name: databricks_pipeline_demo

variables:
  catalog:
    default: databricks_pipeline_demo
  medallion_schema:
    default: medallion
  ml_schema:
    default: ml

resources:
  pipelines:
    medallion_pipeline:
      name: medallion_pipeline
      catalog: ${var.catalog}
      target: ${var.medallion_schema}
      serverless: true
      libraries:
        - notebook:
            path: notebooks/bronze_ingestion.py
        - notebook:
            path: notebooks/silver_cleaning.py
        - notebook:
            path: notebooks/gold_features.py

  jobs:
    medallion_ml_pipeline:
      name: medallion_ml_pipeline
      tasks:
        - task_key: run_medallion
          pipeline_task:
            pipeline_id: ${resources.pipelines.medallion_pipeline.id}

        - task_key: split_data
          depends_on:
            - task_key: run_medallion
          notebook_task:
            notebook_path: notebooks/split_data.py

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-4cfe513d-9a1c.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-4cfe513d-9a1c.cloud.databricks.com
    run_as:
      user_name: yjp1986@gmail.com
