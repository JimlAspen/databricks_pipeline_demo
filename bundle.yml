bundle:
  name: databricks_pipeline_demo

resources:
  pipelines:
    medallion_pipeline:
      name: medallion_pipeline
      target: default   # schema/catalog target for the pipeline's tables
      serverless: true  
      libraries:
        - notebook:
            path: notebooks/bronze_ingestion.py
        - notebook:
            path: notebooks/silver_cleaning.py
        - notebook:
            path: notebooks/gold_features.py

targets:
  default:
    mode: development
    default: true
    workspace:
      host: https://dbc-4cfe513d-9a1c.cloud.databricks.com

